name: comprobac
description: "A platform to verify the veracity of your transactions."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  bancadigital_bm_red_designsystem:
    hosted: https://gsbd.jfrog.io/artifactory/api/pub/digital-lab-pub-local
    version: ^2.4.0-alpha.3
  flutter:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.11

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo/
    - assets/users.json
    - assets/transactions.json