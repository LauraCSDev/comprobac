name: comprobac
description: "A platform to verify the veracity of your transactions."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"


dependencies:
  bancadigital_bm_red_designsystem:
    hosted: https://gsbd.jfrog.io/artifactory/api/pub/digital-lab-pub-local
    version: ^2.11.0-alpha.4
  flutter:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  intl: ^0.20.2
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.15
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo/
    - assets/users.json
    - assets/transactions.json